<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>EAMCET Registration Form</title>
</head>

<body>

    <center>

        <h1>EAMCET Registration Form</h1>

        <form autocomplete="on">

            <!-- Personal Information -->

            <fieldset>

                <legend>Personal Information</legend>

                <br>

                <label for="fullname">Full Name:</label>
                <input type="text"
                       id="fullname"
                       name="fullname"
                       placeholder="Enter your full name"
                       minlength="3"
                       maxlength="30"
                       required
                       autofocus>

                <br><br>

                <label for="email">Email:</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="example@gmail.com"
                       required
                       autocomplete="email">

                <br><br>

                <label for="password">Password:</label>
                <input type="password"
                       id="password"
                       name="password"
                       minlength="6"
                       maxlength="12"
                       required>

                <br><br>

                <label for="age">Age:</label>
                <input type="number"
                       id="age"
                       name="age"
                       min="16"
                       max="25"
                       step="1"
                       required>

                <br><br>

                <label for="dob">Date of Birth:</label>
                <input type="date"
                       id="dob"
                       name="dob"
                       required>

                <br><br>

                <label for="time">Preferred Counseling Time:</label>
                <input type="time"
                       id="time"
                       name="time">

                <br><br>

                <label for="phone">Phone Number:</label>
                <input type="tel"
                       id="phone"
                       name="phone"
                       placeholder="9876543210"
                       pattern="[0-9]{10}"
                       required>

                <br><br>

                <label for="website">Portfolio URL:</label>
                <input type="url"
                       id="website"
                       name="website"
                       placeholder="https://example.com">

                <br><br>

                <label for="color">Favorite Color:</label>
                <input type="color"
                       id="color"
                       name="color">

                <br><br>

                <label for="range">Intermediate Percentage:</label>
                <input type="range"
                       id="range"
                       name="range"
                       min="0"
                       max="100">

                <br><br>

                <label for="photo">Upload Photo:</label>
                <input type="file"
                       id="photo"
                       name="photo">

                <br><br>

            </fieldset>

            <br>

            <!-- Academic Details -->

            <fieldset>

                <legend>Academic Details</legend>

                <br>

                <p>Gender:</p>

                <input type="radio"
                       id="male"
                       name="gender"
                       value="Male">

                <label for="male">Male</label>

                <input type="radio"
                       id="female"
                       name="gender"
                       value="Female">

                <label for="female">Female</label>

                <input type="radio"
                       id="other"
                       name="gender"
                       value="Other">

                <label for="other">Other</label>

                <br><br>

                <p>Preferred Courses:</p>

                <input type="checkbox"
                       id="cse"
                       name="course"
                       value="CSE">

                <label for="cse">CSE</label>

                <input type="checkbox"
                       id="ece"
                       name="course"
                       value="ECE">

                <label for="ece">ECE</label>

                <input type="checkbox"
                       id="mech"
                       name="course"
                       value="MECH">

                <label for="mech">MECH</label>

                <br><br>

                <label for="branch">Select Branch:</label>

                <select id="branch" name="branch">

                    <optgroup label="Engineering">

                        <option>CSE</option>
                        <option>ECE</option>
                        <option>EEE</option>

                    </optgroup>

                    <optgroup label="Other Branches">

                        <option>Civil</option>
                        <option>Mechanical</option>
                        <option>Chemical</option>

                    </optgroup>

                </select>

                <br><br>

                <label for="college">Preferred College Location:</label>

                <select id="college" name="college">

                    <optgroup label="Andhra Pradesh">

                        <option>Vijayawada</option>
                        <option>Guntur</option>
                        <option>Tirupati</option>

                    </optgroup>

                    <optgroup label="Telangana">

                        <option>Hyderabad</option>
                        <option>Warangal</option>
                        <option>Nizamabad</option>

                    </optgroup>

                </select>

                <br><br>

            </fieldset>

            <br>

            <!-- Additional Information -->

            <fieldset>

                <legend>Additional Information</legend>

                <br>

                <label for="browser">Preferred Browser:</label>

                <input list="browsers"
                       id="browser"
                       name="browser">

                <datalist id="browsers">

                    <option value="Chrome">
                    <option value="Firefox">
                    <option value="Edge">
                    <option value="Safari">
                    <option value="Opera">

                </datalist>

                <br><br>

                <label for="message">Why do you want this course?</label>

                <br><br>

                <textarea id="message"
                          name="message"
                          rows="5"
                          cols="40"
                          maxlength="200"
                          placeholder="Write your answer here"></textarea>

                <br><br>

                <input type="submit" value="Register">

                <input type="reset" value="Clear Form">

                <br><br>

            </fieldset>

        </form>

    </center>

</body>
</html>
